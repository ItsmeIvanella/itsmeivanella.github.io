<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanechkinn — Writing Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAF9F5;
  --bg-alt: #FCFBF8;
  --surface: #FFFFFF;
  --border: #E7E4DC;
  --ink: #1C1B18;
  --ink-soft: #57534A;
  --ink-faint: #9B968A;
  --amber: #B8862E;
  --amber-soft: #FBF3E0;
  --rose: #9C4A42;
  --rose-soft: #FAEEEC;
  --blue: #3C5E78;
  --blue-soft: #EBF0F4;
  --purple: #6B5685;
  --purple-soft: #F1EDF5;
  --teal: #3D7066;
  --teal-soft: #EAF3F1;
  --font-serif: 'Lora', Georgia, serif;
  --font-sans: 'Plus Jakarta Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--ink);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; }

.wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

/* ───────── HEADER ───────── */
header.site {
  position: sticky;
  top: 0;
  z-index: 40;
  background: rgba(250, 249, 245, 0.85);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}

.header-inner {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 18px 0;
}

.brand { display: flex; align-items: baseline; gap: 10px; }

.brand h1 {
  font-family: var(--font-serif);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--teal-soft);
  border: 1px solid #cfe5e0;
  color: #285a51;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 999px;
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #2f9b80;
}

.role-line {
  font-size: 13px;
  color: var(--ink-soft);
  font-weight: 500;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-soft);
}

.icon-link {
  display: inline-flex;
  padding: 5px;
  color: var(--ink-soft);
  text-decoration: none;
  transition: color .15s;
}
.icon-link:hover { color: var(--ink); }

.divider-v { width: 1px; height: 16px; background: var(--border); }

.btn-dark {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 13px;
  background: var(--ink);
  color: var(--bg);
  border: none;
  padding: 9px 18px;
  border-radius: 999px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  text-decoration: none;
  transition: opacity .15s;
}
.btn-dark:hover { opacity: .85; }

.btn-outline {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 13px;
  background: var(--surface);
  color: var(--ink);
  border: 1px solid #D9D5CB;
  padding: 9px 18px;
  border-radius: 999px;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: border-color .15s, background .15s;
}
.btn-outline:hover { background: var(--bg-alt); border-color: #c4c0b4; }

/* ───────── HERO ───────── */
.hero { padding: 88px 0 96px; }

.hero-grid {
  display: grid;
  grid-template-columns: 1.5fr 1fr;
  gap: 56px;
  align-items: center;
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--ink-soft);
  padding: 5px 12px;
  border-radius: 999px;
  margin-bottom: 24px;
}

.hero h2 {
  font-family: var(--font-serif);
  font-weight: 300;
  font-size: clamp(34px, 4.6vw, 52px);
  line-height: 1.08;
  letter-spacing: -0.5px;
  margin-bottom: 22px;
}

.hero h2 em {
  font-style: italic;
  font-weight: 400;
  color: var(--ink);
}

.hero p.bio {
  font-size: 16.5px;
  color: var(--ink-soft);
  max-width: 540px;
  line-height: 1.75;
  margin-bottom: 32px;
}

.hero-ctas { display: flex; gap: 14px; flex-wrap: wrap; }

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  position: relative;
  overflow: hidden;
}

.stat-card-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 18px;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 11px 0;
  border-bottom: 1px dashed var(--border);
}
.stat-row:last-child { border-bottom: none; padding-bottom: 0; }

.stat-row span:first-child { font-size: 13.5px; color: var(--ink-soft); }
.stat-row span:last-child {
  font-family: var(--font-serif);
  font-size: 21px;
  font-weight: 700;
}

.stat-note {
  margin-top: 18px;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
}
.stat-note-label {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--ink-faint);
  display: block;
  margin-bottom: 5px;
}
.stat-note p { font-size: 12.5px; color: var(--ink-soft); line-height: 1.6; }

/* ───────── PORTFOLIO SECTION ───────── */
.section-portfolio {
  border-top: 1px solid var(--border);
  background: var(--surface);
  padding: 84px 0;
}

.portfolio-head {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: flex-end;
  gap: 24px;
  margin-bottom: 44px;
}

.eyebrow-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--ink-faint);
  display: block;
  margin-bottom: 8px;
}

.portfolio-head h2 {
  font-family: var(--font-serif);
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.4px;
  margin-bottom: 8px;
}

.portfolio-head p {
  font-size: 14.5px;
  color: var(--ink-soft);
  max-width: 480px;
}

.search-box { position: relative; width: 100%; max-width: 320px; }

.search-box svg {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-faint);
}

.search-box input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px 10px 36px;
  font-family: var(--font-sans);
  font-size: 13.5px;
  color: var(--ink);
}
.search-box input:focus { outline: 2px solid var(--ink); outline-offset: 1px; }
.search-box input::placeholder { color: var(--ink-faint); }

.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}

.tab {
  font-family: var(--font-sans);
  font-size: 13.5px;
  font-weight: 600;
  color: var(--ink-faint);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 9px 14px;
  cursor: pointer;
  transition: color .15s;
}
.tab:hover { color: var(--ink-soft); }
.tab.active { color: var(--ink); border-bottom-color: var(--ink); }

.result-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 11.5px;
  letter-spacing: 0.5px;
  color: var(--ink-faint);
  margin-bottom: 22px;
}
.result-row button {
  font-family: var(--font-mono);
  font-size: 11.5px;
  background: none;
  border: none;
  color: var(--ink-soft);
  text-decoration: underline;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
}

.empty-state {
  text-align: center;
  padding: 80px 20px;
  border: 1px dashed var(--border);
  border-radius: 18px;
  background: var(--bg-alt);
}
.empty-state p:first-child { font-family: var(--font-serif); font-style: italic; font-size: 17px; color: var(--ink-soft); margin-bottom: 8px; }
.empty-state p:last-child { font-size: 12.5px; color: var(--ink-faint); }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 320px;
  transition: transform .18s, box-shadow .18s, border-color .18s;
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 24px -8px rgba(28,27,24,0.10);
  border-color: #D9D5CB;
}

.card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 1px;
  text-transform: uppercase;
  border: 1px solid;
  padding: 3px 8px;
  border-radius: 6px;
}
.badge.email { background: var(--blue-soft); color: var(--blue); border-color: #c9dae5; }
.badge.social { background: var(--purple-soft); color: var(--purple); border-color: #ddd3e7; }
.badge.copy { background: var(--amber-soft); color: var(--amber); border-color: #ecd8a8; }
.badge.journalism { background: var(--rose-soft); color: var(--rose); border-color: #e6cdc9; }
.badge.essays { background: var(--teal-soft); color: var(--teal); border-color: #c5e0da; }

.read-time {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--ink-faint);
  display: flex;
  align-items: center;
  gap: 4px;
}

.card h3 {
  font-family: var(--font-serif);
  font-size: 19px;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 8px;
}

.card .client-line {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-faint);
  margin-bottom: 12px;
}
.card .client-line strong { color: var(--ink-soft); font-family: var(--font-sans); font-weight: 600; }

.card .summary {
  font-size: 13.5px;
  color: var(--ink-soft);
  line-height: 1.65;
  margin-bottom: 18px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 11.5px;
  font-weight: 600;
}

/* ───────── SERVICES ───────── */
.section-services {
  border-top: 1px solid var(--border);
  background: var(--bg-alt);
  padding: 72px 0;
}

.services-head { max-width: 520px; margin-bottom: 44px; }
.services-head h2 {
  font-family: var(--font-serif);
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -0.3px;
  margin-bottom: 10px;
}
.services-head p { font-size: 14px; color: var(--ink-soft); line-height: 1.65; }

.services-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
}

.service-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 26px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  transition: border-color .2s, box-shadow .2s;
}
.service-card:hover { border-color: #D9D5CB; box-shadow: 0 10px 22px -10px rgba(28,27,24,0.10); }

.service-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 22px;
}

.service-card h3 { font-family: var(--font-serif); font-size: 17px; font-weight: 700; margin-bottom: 8px; }
.service-card p { font-size: 13.5px; color: var(--ink-soft); line-height: 1.6; }

/* ───────── CONTACT ───────── */
.section-contact {
  border-top: 1px solid var(--border);
  background: var(--surface);
  padding: 88px 0;
}

.contact-grid {
  display: grid;
  grid-template-columns: 0.85fr 1fr;
  gap: 56px;
  align-items: start;
}

.contact-eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-faint); display: block; margin-bottom: 10px; }

.contact-grid h2 {
  font-family: var(--font-serif);
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -0.3px;
  line-height: 1.25;
  margin-bottom: 18px;
}

.contact-grid > div:first-child > p {
  font-size: 14px;
  color: var(--ink-soft);
  line-height: 1.7;
  max-width: 420px;
  margin-bottom: 26px;
}

.contact-card {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 12px;
  text-decoration: none;
}

.contact-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.contact-card .label { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-faint); display: block; margin-bottom: 2px; }
.contact-card .value { font-size: 13.5px; font-weight: 600; color: var(--ink); }

.credo {
  border-left: 2px solid var(--ink);
  background: var(--bg-alt);
  padding: 16px 18px;
  margin-top: 22px;
}
.credo p { font-family: var(--font-serif); font-style: italic; font-size: 13px; color: var(--ink-soft); line-height: 1.65; }

.form-card {
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 32px;
}

.form-card h3 { font-family: var(--font-serif); font-size: 18px; font-weight: 700; margin-bottom: 22px; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.field label { font-family: var(--font-mono); font-size: 11.5px; font-weight: 600; color: var(--ink-soft); }
.field label .req { color: #b14545; }

.field input, .field select, .field textarea {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 10px 13px;
  font-family: var(--font-sans);
  font-size: 13.5px;
  color: var(--ink);
}
.field input:focus, .field select:focus, .field textarea:focus { outline: 2px solid var(--ink); outline-offset: 1px; }
.field textarea { resize: vertical; min-height: 90px; }

.submit-btn {
  width: 100%;
  background: var(--ink);
  color: var(--bg);
  border: none;
  border-radius: 9px;
  padding: 13px;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: opacity .15s;
}
.submit-btn:hover { opacity: .88; }

.success-box {
  background: var(--teal-soft);
  border: 1px solid #c5e0da;
  border-radius: 14px;
  padding: 28px;
  text-align: center;
}
.success-box h4 { font-family: var(--font-serif); font-size: 17px; margin: 12px 0 6px; }
.success-box p { font-size: 12.5px; color: var(--ink-soft); max-width: 320px; margin: 0 auto 14px; line-height: 1.6; }
.success-box button { font-family: var(--font-mono); font-size: 12px; font-weight: 700; background: none; border: none; text-decoration: underline; cursor: pointer; color: var(--ink); }

/* ───────── FOOTER ───────── */
footer.site {
  border-top: 1px solid var(--border);
  background: var(--bg-alt);
  padding: 40px 0;
}
.footer-inner {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: center;
  gap: 18px;
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--ink-faint);
}
.footer-inner a { text-decoration: none; }
.footer-inner a:hover { color: var(--ink); }
.footer-links { display: flex; align-items: center; gap: 12px; }

/* ───────── MODAL DRAWER ───────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(28,27,24,0.55);
  backdrop-filter: blur(2px);
  z-index: 100;
  opacity: 0;
  visibility: hidden;
  transition: opacity .25s;
}
.overlay.open { opacity: 1; visibility: visible; }

.drawer {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 100%;
  max-width: 680px;
  background: var(--bg);
  z-index: 101;
  transform: translateX(100%);
  transition: transform .35s cubic-bezier(.2,.8,.2,1);
  display: flex;
  flex-direction: column;
  box-shadow: -20px 0 50px rgba(0,0,0,0.18);
}
.drawer.open { transform: translateX(0); }

.drawer-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.drawer-head-tags { display: flex; align-items: center; gap: 10px; }
.drawer-head .sep { color: var(--border); }
.drawer-head .readtime { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-soft); }

.close-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
  border-radius: 999px;
  color: var(--ink-faint);
  transition: background .15s, color .15s;
}
.close-btn:hover { background: var(--bg-alt); color: var(--ink); }

.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 32px 28px 48px;
}

.drawer-body h2 {
  font-family: var(--font-serif);
  font-size: 27px;
  font-weight: 700;
  line-height: 1.25;
  margin-bottom: 10px;
}
.drawer-body .subtitle { font-size: 15px; color: var(--ink-soft); margin-bottom: 14px; }

.drawer-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--ink-soft);
  margin-bottom: 26px;
}
.drawer-meta strong { color: var(--ink); font-family: var(--font-sans); font-weight: 600; }
.drawer-meta .sep { color: var(--border); }

.ext-link {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 26px;
  text-decoration: none;
  transition: border-color .15s, background .15s;
}
.ext-link:hover { border-color: #c4c0b4; background: var(--bg-alt); }
.ext-link-left { display: flex; align-items: center; gap: 12px; }
.ext-link .ext-icon { width: 34px; height: 34px; border-radius: 8px; background: var(--bg-alt); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
.ext-link .ext-label { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-faint); display: block; margin-bottom: 2px; }
.ext-link .ext-value { font-size: 13.5px; font-weight: 600; }

.metrics-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 28px;
}
.metrics-box .label-top { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-faint); display: block; margin-bottom: 12px; }
.metrics-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.metric-cell { background: var(--bg-alt); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
.metric-cell .val { font-family: var(--font-serif); font-size: 19px; font-weight: 700; display: block; margin-bottom: 2px; }
.metric-cell .lab { font-size: 11px; color: var(--ink-soft); line-height: 1.3; }

.section-block { margin-bottom: 22px; padding-bottom: 22px; border-bottom: 1px solid var(--border); }
.section-block:last-child { border-bottom: none; }
.section-block h4 { font-family: var(--font-serif); font-size: 17px; font-weight: 700; margin-bottom: 10px; }

.brief-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; padding-bottom: 22px; margin-bottom: 22px; border-bottom: 1px dashed var(--border); }
.brief-cols h5 { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 8px; }
.brief-cols .brief-label { color: var(--rose); }
.brief-cols .approach-label { color: var(--teal); }
.brief-cols p { font-size: 13.5px; color: var(--ink-soft); line-height: 1.65; }
